  <script>
  function getCookie(name) {
    var match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
    return match ? decodeURIComponent(match[2]) : null;
  }

  function setCookie(name, value, days) {
    var expires = '';
    if (days) {
      var date = new Date();
      date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
      expires = '; expires=' + date.toUTCString();
    }
    document.cookie = name + '=' + encodeURIComponent(value) + expires + '; path=/';
  }

  function getFbp() {
    var fbp = getCookie('_fbp');
    if (fbp) return fbp;
    var ts = Date.now();
    var rand = Math.floor(Math.random() * 10000000000);
    fbp = 'fb.1.' + ts + '.' + rand;
    setCookie('_fbp', fbp, 90);
    return fbp;
  }

  function getFbc() {
    var existing = getCookie('_fbc');
    if (existing) return existing;
    var params = new URLSearchParams(window.location.search);
    var fbclid = params.get('fbclid');
    if (!fbclid) return null;
    var ts = Math.floor(Date.now() / 1000);
    var fbc = 'fb.1.' + ts + '.' + fbclid;
    setCookie('_fbc', fbc, 90);
    return fbc;
  }

  function buildStartParam(payload) {
    var json = JSON.stringify(payload);
    var b64 = btoa(unescape(encodeURIComponent(json)));
    return encodeURIComponent(b64);
  }

  var payload = { free_access: true };
  var fbp = getFbp();
  if (fbp) payload.fbp = fbp;
  var fbc = getFbc();
  if (fbc) payload.fbc = fbc;
  if (navigator && navigator.userAgent) payload.ua = navigator.userAgent;

  var capiJoinEndpoint = 'https://botpnv.shop/meta-capi/join-submundo';

  // Redireciona para o BOT (não para o grupo)
  var telegramUrl = 'https://t.me/vipssnbot?start=' + buildStartParam(payload);

  // Evento Pixel personalizado no clique do botão
  function trackLeadQualificado() {

  function sendJoinSubmundoCapi(eventId) {
    var capiPayload = {
      event_id: eventId,
      event_source_url: window.location.href,
      fbc: payload.fbc || null,
      fbp: payload.fbp || null,
      ua: navigator && navigator.userAgent ? navigator.userAgent : null
    };

    try {
      if (navigator.sendBeacon) {
        var blob = new Blob([JSON.stringify(capiPayload)], { type: 'application/json' });
        navigator.sendBeacon(capiJoinEndpoint, blob);
        return;
      }
      fetch(capiJoinEndpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(capiPayload),
        keepalive: true
      }).catch(function(){});
    } catch (e) {}
  }

  }
